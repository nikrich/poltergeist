name: star-tracker

# Log the daily GitHub star count to metrics/stars.csv so we can chart growth.
on:
  schedule:
    - cron: '17 6 * * *' # daily 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Record star count
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          stars=$(gh api "repos/$GITHUB_REPOSITORY" --jq '.stargazers_count')
          today=$(date -u +%Y-%m-%d)
          mkdir -p metrics
          [ -f metrics/stars.csv ] || echo "date,stars" > metrics/stars.csv
          if grep -q "^${today}," metrics/stars.csv; then
            # idempotent: overwrite today's row (handles manual re-runs)
            tmp=$(mktemp); grep -v "^${today}," metrics/stars.csv > "$tmp"; mv "$tmp" metrics/stars.csv
          fi
          echo "${today},${stars}" >> metrics/stars.csv
          if ! git diff --quiet -- metrics/stars.csv; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add metrics/stars.csv
            git commit -m "chore(metrics): stars ${today} = ${stars}"
            git push
          fi
