name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e ".[dev,api]"
      - name: Run tests
        # Deliberately NOT tests/ in full — test_calendar, test_joplin, and
        # test_weekly_digest depend on macOS-native frameworks (EventKit, etc.)
        # and fail off this Mac. Only the API and connector tests are CI-safe.
        run: |
          python -m pytest \
            ghostbrain/api/tests/ \
            tests/test_atlassian_import_refactor.py \
            tests/test_confluence_connector.py \
            tests/test_jira_connector.py \
            -q

  desktop:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npx vitest run
      - name: Type check
        run: npm run typecheck
