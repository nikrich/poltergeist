name: release

on:
  push:
    branches: [main]
  release:
    types: [published]
  # Manual trigger for re-running build-mac against an existing release tag
  # (e.g. when notarization hit a slow Apple queue).
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to build + upload to (e.g. v0.1.1)'
        required: true
        type: string
      use_main_head:
        description: 'Check out main HEAD instead of the release tag (lets you re-run with CI/build fixes that landed after the tag was cut)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      # rp wins when it actually cuts the release; otherwise the fallback's
      # outputs take over. (Explicit `== 'true'` avoids the GHA footgun where a
      # literal 'false' string is truthy for `||`.)
      release_created: ${{ steps.rp.outputs.releases_created == 'true' && 'true' || steps.fallback.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs['desktop--tag_name'] || steps.fallback.outputs.tag_name }}
      version: ${{ steps.rp.outputs['desktop--version'] || steps.fallback.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please intermittently declines to cut the GitHub release on the
      # push that merges a release PR — it logs "untagged, merged release PRs
      # outstanding - aborting" and leaves the version bumped in the manifest
      # but with no tag/release, so the build never fires. This fallback cuts
      # the release itself in that case and flags release_created=true so the
      # build jobs run in THIS same run (a GITHUB_TOKEN-created release does not
      # emit a `release` event, so the build can't rely on that trigger).
      - name: Checkout for fallback release
        if: steps.rp.outputs.releases_created != 'true'
        uses: actions/checkout@v4
      - name: Fallback — cut release if release-please did not
        id: fallback
        if: steps.rp.outputs.releases_created != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version=$(jq -r '.desktop' .release-please-manifest.json)
          tag="v${version}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists — nothing to do"
            exit 0
          fi
          # Only act when HEAD is the merge of a release PR.
          subject=$(git log -1 --pretty=%s)
          if ! printf '%s' "$subject" | grep -qiE 'chore: release|release main'; then
            echo "HEAD ($subject) is not a release commit — skipping fallback"
            exit 0
          fi
          # Extract this version's CHANGELOG section for the release notes.
          awk -v hdr="## [${version}]" '
            index($0, hdr) {inside=1}
            inside && /^## \[/ && !index($0, hdr) {exit}
            inside {print}
          ' desktop/CHANGELOG.md > /tmp/notes.md || true
          [ -s /tmp/notes.md ] || echo "Release ${tag}" > /tmp/notes.md
          gh release create "$tag" --target "$GITHUB_SHA" --title "$tag" --notes-file /tmp/notes.md
          {
            echo "release_created=true"
            echo "tag_name=${tag}"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"
          echo "fallback created release ${tag}"

  build-mac:
    needs: release-please
    # Two ways in: (1) release-please cut a new release on push, or
    # (2) a release was published manually (rescue path for the first cut,
    # or any time we need to bypass release-please).
    if: |
      always() &&
      (
        github.event_name == 'release' ||
        github.event_name == 'workflow_dispatch' ||
        needs.release-please.outputs.release_created == 'true'
      )
    runs-on: macos-14  # arm64 native
    # Apple's notary service queue varies. Most submissions finish in under
    # 10 minutes, but a 600MB+ bundle with thousands of inner code-signed
    # files can wait an hour when the queue is busy. 120 absorbs that.
    timeout-minutes: 120
    env:
      # electron-builder reads these to sign the .app and the Python sidecar.
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      # Read by scripts/notarize.cjs.
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Resolve the release tag from whichever trigger fired.
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event_name == 'workflow_dispatch' && inputs.release_tag || needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          # For release: published, github.event.release.target_commitish is
          # the branch; for push, the default checkout points at the merge
          # commit. Both produce the right tree for the build.
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event_name == 'workflow_dispatch' && (inputs.use_main_head == true && 'main' || inputs.release_tag) || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          # The sidecar imports fastapi/uvicorn (the `api` extra) and lazy-loads
          # sentence-transformers (the `semantic` extra). Both must be present
          # at PyInstaller analysis time for the hidden-imports list to resolve.
          pip install -e ".[api,semantic]"
          pip install pyinstaller==6.11.1
          # torch >= 2.9 wants setuptools>=77, which pip satisfies with 82+ —
          # where pkg_resources was REMOVED. PyInstaller 6.11.1 still injects
          # its pkg_resources bootstrap hook, so the frozen sidecar dies at
          # launch ("No module named 'pkg_resources'"; broke v1.0.0/v1.0.1).
          # 81.0.0 is the last version that ships pkg_resources.
          pip install "setuptools<82"

      - name: Build Python sidecar
        run: |
          pyinstaller packaging/sidecar.spec \
            --distpath desktop/resources/sidecar \
            --workpath packaging/build \
            --noconfirm
          # shellcheck disable=SC2012  # ls is fine here, the dir is ours
          ls -la desktop/resources/sidecar/ghostbrain-api | head -20

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Typecheck + lint + test
        working-directory: desktop
        run: |
          npm run typecheck
          npm run lint
          npm test

      - name: Build + sign + notarize
        working-directory: desktop
        run: npm run pack

      - name: Upload assets to release
        run: |
          shopt -s nullglob
          gh release upload "$RELEASE_TAG" \
            desktop/dist/*.dmg \
            desktop/dist/*.zip \
            desktop/dist/*.blockmap \
            desktop/dist/latest*.yml \
            --clobber

  build-linux:
    needs: release-please
    if: |
      always() &&
      (
        github.event_name == 'release' ||
        github.event_name == 'workflow_dispatch' ||
        needs.release-please.outputs.release_created == 'true'
      )
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event_name == 'workflow_dispatch' && inputs.release_tag || needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event_name == 'workflow_dispatch' && (inputs.use_main_head == true && 'main' || inputs.release_tag) || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          # On linux, pip resolves torch (via sentence-transformers) to CUDA
          # wheels — multi-GB of nvidia libs that get baked into the sidecar
          # and push the AppImage past GitHub's 2 GiB asset limit. The sidecar
          # only does CPU inference; install the CPU wheel first so the
          # semantic extra's resolver keeps it.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[api,semantic]"
          pip install pyinstaller==6.11.1
          # Last setuptools that ships pkg_resources, which PyInstaller
          # 6.11.1's bootstrap hook needs (see the mac step for the story).
          pip install "setuptools<82"

      - name: Build Python sidecar
        run: |
          pyinstaller packaging/sidecar.spec \
            --distpath desktop/resources/sidecar \
            --workpath packaging/build \
            --noconfirm
          # shellcheck disable=SC2012  # ls is fine here, the dir is ours
          ls -la desktop/resources/sidecar/ghostbrain-api | head -20

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Typecheck + lint + test
        working-directory: desktop
        run: |
          npm run typecheck
          npm run lint
          npm test

      - name: Build (unsigned)
        working-directory: desktop
        run: npm run pack:linux

      - name: Upload assets to release
        run: |
          shopt -s nullglob
          gh release upload "$RELEASE_TAG" \
            desktop/dist/*.AppImage \
            desktop/dist/*.deb \
            desktop/dist/*.blockmap \
            desktop/dist/latest*.yml \
            --clobber

  build-win:
    needs: release-please
    if: |
      always() &&
      (
        github.event_name == 'release' ||
        github.event_name == 'workflow_dispatch' ||
        needs.release-please.outputs.release_created == 'true'
      )
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event_name == 'workflow_dispatch' && inputs.release_tag || needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event_name == 'workflow_dispatch' && (inputs.use_main_head == true && 'main' || inputs.release_tag) || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python deps + PyInstaller
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,semantic]"
          pip install pyinstaller==6.11.1
          # Last setuptools that ships pkg_resources, which PyInstaller
          # 6.11.1's bootstrap hook needs (see the mac step for the story).
          pip install "setuptools<82"

      - name: Build Python sidecar
        shell: bash
        run: |
          pyinstaller packaging/sidecar.spec \
            --distpath desktop/resources/sidecar \
            --workpath packaging/build \
            --noconfirm
          # shellcheck disable=SC2012  # ls is fine here, the dir is ours
          ls -la desktop/resources/sidecar/ghostbrain-api | head -20

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Typecheck + lint + test
        working-directory: desktop
        run: |
          npm run typecheck
          npm run lint
          npm test

      - name: Build (unsigned)
        working-directory: desktop
        run: npm run pack:win

      - name: Upload assets to release
        shell: bash
        run: |
          shopt -s nullglob
          gh release upload "$RELEASE_TAG" \
            desktop/dist/*.exe \
            desktop/dist/*.zip \
            desktop/dist/*.blockmap \
            desktop/dist/latest*.yml \
            --clobber
