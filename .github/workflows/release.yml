name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.releases_created }}
      tag_name: ${{ steps.rp.outputs['desktop--tag_name'] }}
      version: ${{ steps.rp.outputs['desktop--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-mac:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: macos-14  # arm64 native
    timeout-minutes: 60
    env:
      # electron-builder reads these to sign the .app and the Python sidecar.
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      # Read by scripts/notarize.cjs.
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          # The sidecar imports fastapi/uvicorn (the `api` extra) and lazy-loads
          # sentence-transformers (the `semantic` extra). Both must be present
          # at PyInstaller analysis time for the hidden-imports list to resolve.
          pip install -e ".[api,semantic]"
          pip install pyinstaller==6.11.1

      - name: Build Python sidecar
        run: |
          pyinstaller packaging/sidecar.spec \
            --distpath desktop/resources/sidecar \
            --workpath packaging/build \
            --noconfirm
          ls -la desktop/resources/sidecar/ghostbrain-api | head -20

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Typecheck + lint + test
        working-directory: desktop
        run: |
          npm run typecheck
          npm run lint
          npm test

      - name: Build + sign + notarize
        working-directory: desktop
        run: npm run pack

      - name: Upload assets to release
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          shopt -s nullglob
          gh release upload "$TAG" \
            desktop/dist/*.dmg \
            desktop/dist/*.zip \
            desktop/dist/*.blockmap \
            desktop/dist/latest-mac.yml \
            --clobber
